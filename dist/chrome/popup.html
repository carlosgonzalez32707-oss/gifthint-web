<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GiftHint</title>
  <link rel="stylesheet" href="popup-skeleton.css">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 360px;
      height: 540px;
      overflow: hidden;
      background: #0C0C0E;
      color: #F0EEE8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    #root {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      scrollbar-width: thin;
      scrollbar-color: rgba(240,238,232,0.1) transparent;
    }

    #root::-webkit-scrollbar       { width: 4px; }
    #root::-webkit-scrollbar-track { background: transparent; }
    #root::-webkit-scrollbar-thumb { background: rgba(240,238,232,0.12); border-radius: 2px; }

    /* ── Custom list-selector dropdown ─────────────────────────── */

    .list-selector {
      position: relative;
      width: 100%;
    }

    .list-selector__trigger {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 10px;
      border: 1px solid rgba(240,238,232,0.12);
      background: #1C1C22;
      color: #F0EEE8;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: border-color 120ms ease;
      outline: none;
    }

    .list-selector__trigger:focus,
    .list-selector__trigger:hover {
      border-color: rgba(139,131,240,0.4);
    }

    .list-selector__trigger.open {
      border-color: #8B83F0;
      border-bottom-left-radius:  4px;
      border-bottom-right-radius: 4px;
    }

    .list-selector__trigger-emoji  { font-size: 15px; flex-shrink: 0; line-height: 1; }
    .list-selector__trigger-name   { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
    .list-selector__trigger-count  { font-size: 11px; color: #7A7870; flex-shrink: 0; }
    .list-selector__trigger-chevron {
      flex-shrink: 0;
      font-size: 10px;
      color: #7A7870;
      transition: transform 120ms ease;
    }
    .list-selector__trigger.open .list-selector__trigger-chevron { transform: rotate(180deg); }

    .list-selector__menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      z-index: 100;
      border: 1px solid rgba(139,131,240,0.4);
      border-top: none;
      border-bottom-left-radius: 10px;
      border-bottom-right-radius: 10px;
      background: #1C1C22;
      overflow: hidden;
      max-height: 220px;
      overflow-y: auto;
    }

    .list-selector__menu.open { display: block; }

    .list-selector__item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      cursor: pointer;
      font-size: 13px;
      transition: background 80ms ease;
    }

    .list-selector__item:hover                { background: rgba(139,131,240,0.12); }
    .list-selector__item.active               { background: rgba(139,131,240,0.18); }
    .list-selector__item.active .ls-name      { color: #8B83F0; font-weight: 700; }
    .list-selector__item-emoji                { font-size: 14px; flex-shrink: 0; }
    .ls-name  { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #F0EEE8; }
    .ls-count { font-size: 11px; color: #7A7870; flex-shrink: 0; }
    .list-selector__item-check { font-size: 12px; color: #8B83F0; flex-shrink: 0; width: 14px; }

    .list-selector__divider {
      height: 1px;
      background: rgba(240,238,232,0.07);
      margin: 0 12px;
    }

    .list-selector__create {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      cursor: pointer;
      font-size: 12px;
      color: #7A7870;
      transition: color 80ms ease, background 80ms ease;
    }

    .list-selector__create:hover { background: rgba(240,238,232,0.04); color: #F0EEE8; }

    /* ── Countdown badge ────────────────────────────────────────── */

    .countdown-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(139,131,240,0.16);
      border: 1px solid rgba(139,131,240,0.3);
      color: #A09AF2;
      white-space: nowrap;
    }

    .countdown-badge.soon {
      background: rgba(226,162,74,0.16);
      border-color: rgba(226,162,74,0.3);
      color: #E2A24A;
    }

    .countdown-badge.tomorrow {
      background: rgba(78,201,154,0.16);
      border-color: rgba(78,201,154,0.3);
      color: #4EC99A;
    }

    /* ── Quick actions row ──────────────────────────────────────── */

    .quick-actions {
      display: flex;
      gap: 6px;
      padding: 8px 14px 0;
    }

    .quick-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 7px 6px;
      border-radius: 8px;
      border: 1px solid rgba(240,238,232,0.1);
      background: transparent;
      color: #7A7870;
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: background 100ms ease, color 100ms ease, border-color 100ms ease;
      white-space: nowrap;
    }

    .quick-btn:hover { background: rgba(240,238,232,0.06); color: #F0EEE8; border-color: rgba(240,238,232,0.18); }
    .quick-btn.copied { color: #4EC99A; border-color: rgba(78,201,154,0.4); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="popup.js"></script>
</body>
</html>
